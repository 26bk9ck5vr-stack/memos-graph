<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memos-graph Viewer - Agent 状态监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .progress-affinity { background: linear-gradient(90deg, #ff6b6b, #feca57); }
        .progress-mood { background: linear-gradient(90deg, #54a0ff, #5f27cd); }
        .progress-energy { background: linear-gradient(90deg, #1dd1a1, #10ac84); }
        .stage-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        .timeline-item {
            position: relative;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 20px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
        }
        .timeline-time {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        .timeline-content {
            color: #333;
        }
        .timeline-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 10px;
        }
        .type-memory { background: #e3f2fd; color: #1976d2; }
        .type-promise { background: #fff3e0; color: #f57c00; }
        .type-event { background: #f3e5f5; color: #7b1fa2; }
        .promise-card {
            background: #fff3e0;
            border-left: 4px solid #f57c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .promise-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .status-open { background: #ffcc80; color: #e65100; }
        .status-fulfilled { background: #a5d6a7; color: #1b5e20; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 memos-graph Agent 监控</h1>
        
        <!-- Agent 状态卡片 -->
        <div class="dashboard" id="agent-stats">
            <div class="loading">加载 Agent 状态...</div>
        </div>

        <!-- 状态趋势图 -->
        <div class="section">
            <h2>📊 状态趋势</h2>
            <canvas id="statusChart" height="80"></canvas>
        </div>

        <!-- 承诺看板 -->
        <div class="section">
            <h2>✅ 承诺追踪</h2>
            <div id="promises-board" class="loading">加载承诺...</div>
        </div>

        <!-- 事件时间线 -->
        <div class="section">
            <h2>📜 事件时间线</h2>
            <div id="event-timeline" class="loading">加载事件...</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        const AGENT_ID = 'hermes';

        // 加载 Agent 状态
        async function loadAgentState() {
            try {
                const response = await fetch(`${API_BASE}/agents/${AGENT_ID}/state`);
                const state = await response.json();
                
                if (state.detail) {
                    // Agent 不存在，创建默认状态
                    await fetch(`${API_BASE}/agents/${AGENT_ID}/state`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            stage: 1,
                            affinity: 50,
                            mood: 50,
                            energy: 50,
                            state: {}
                        })
                    });
                    location.reload();
                    return;
                }

                document.getElementById('agent-stats').innerHTML = `
                    <div class="card">
                        <h2>🎯 关系阶段</h2>
                        <div class="stat-value">${getStageEmoji(state.stage)} 阶段 ${state.stage}</div>
                        <div class="stat-label">${getStageName(state.stage)}</div>
                        <div style="margin-top: 15px;">
                            <span class="stage-badge">Stage ${state.stage}</span>
                        </div>
                    </div>
                    <div class="card">
                        <h2>❤️ 好感度</h2>
                        <div class="stat-value">${state.affinity.toFixed(0)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill progress-affinity" style="width: ${state.affinity}%"></div>
                        </div>
                        <div class="stat-label">0 - 100</div>
                    </div>
                    <div class="card">
                        <h2>😊 心情</h2>
                        <div class="stat-value">${state.mood.toFixed(0)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill progress-mood" style="width: ${state.mood}%"></div>
                        </div>
                        <div class="stat-label">0 - 100</div>
                    </div>
                    <div class="card">
                        <h2>⚡ 能量</h2>
                        <div class="stat-value">${state.energy.toFixed(0)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill progress-energy" style="width: ${state.energy}%"></div>
                        </div>
                        <div class="stat-label">0 - 100</div>
                    </div>
                `;

                // 初始化图表
                initChart(state);
            } catch (error) {
                console.error('加载 Agent 状态失败:', error);
                document.getElementById('agent-stats').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }

        // 加载承诺
        async function loadPromises() {
            try {
                const response = await fetch(`${API_BASE}/promises?agent_id=${AGENT_ID}&status=open`);
                const promises = await response.json();
                
                if (promises.length === 0) {
                    document.getElementById('promises-board').innerHTML = `
                        <p style="color: #666; text-align: center;">暂无待完成的承诺</p>
                    `;
                    return;
                }

                document.getElementById('promises-board').innerHTML = promises.map(p => `
                    <div class="promise-card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong>${p.content}</strong>
                            <span class="promise-status status-open">${p.status.toUpperCase()}</span>
                        </div>
                        ${p.deadline ? `<div style="margin-top: 8px; color: #666; font-size: 0.9em;">
                            ⏰ 截止：${new Date(p.deadline).toLocaleString('zh-CN')}
                        </div>` : ''}
                        <div style="margin-top: 8px; color: #999; font-size: 0.85em;">
                            创建于：${new Date(p.created_at).toLocaleString('zh-CN')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载承诺失败:', error);
                document.getElementById('promises-board').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }

        // 加载事件时间线
        async function loadEvents() {
            try {
                const response = await fetch(`${API_BASE}/events?agent_id=${AGENT_ID}&limit=20`);
                const events = await response.json();
                
                if (events.length === 0) {
                    document.getElementById('event-timeline').innerHTML = `
                        <p style="color: #666; text-align: center;">暂无事件记录</p>
                    `;
                    return;
                }

                document.getElementById('event-timeline').innerHTML = `
                    <div class="timeline">
                        ${events.map(e => `
                            <div class="timeline-item">
                                <div class="timeline-time">${new Date(e.created_at).toLocaleString('zh-CN')}</div>
                                <div class="timeline-content">
                                    ${e.summary || '无摘要'}
                                    <span class="timeline-type type-${getEventType(e.event_type)}">${e.event_type}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('加载事件失败:', error);
                document.getElementById('event-timeline').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }

        // 初始化图表
        function initChart(currentState) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            // 生成模拟历史数据
            const labels = [];
            const affinityData = [];
            const moodData = [];
            const energyData = [];
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'}));
                
                // 模拟数据
                const baseAffinity = currentState.affinity - (i * 2);
                const baseMood = currentState.mood - (i * 1.5);
                const baseEnergy = currentState.energy - (i * 1);
                
                affinityData.push(Math.max(0, Math.min(100, baseAffinity + Math.random() * 10 - 5)));
                moodData.push(Math.max(0, Math.min(100, baseMood + Math.random() * 10 - 5)));
                energyData.push(Math.max(0, Math.min(100, baseEnergy + Math.random() * 10 - 5)));
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '好感度',
                            data: affinityData,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '心情',
                            data: moodData,
                            borderColor: '#54a0ff',
                            backgroundColor: 'rgba(84, 160, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '能量',
                            data: energyData,
                            borderColor: '#1dd1a1',
                            backgroundColor: 'rgba(29, 209, 161, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            title: {
                                display: true,
                                text: '数值 (0-100)'
                            }
                        }
                    }
                }
            });
        }

        // 辅助函数
        function getStageEmoji(stage) {
            const emojis = ['👶', '🧒', '👦', '👨', '👴'];
            return emojis[Math.min(stage - 1, 4)] || '👤';
        }

        function getStageName(stage) {
            const names = ['陌生人', '熟人', '朋友', '好友', '亲密'];
            return names[Math.min(stage - 1, 4)] || '未知';
        }

        function getEventType(type) {
            const types = {
                'message': 'memory',
                'heartbeat': 'promise',
                'mood_change': 'event',
                'stage_up': 'event',
                'promise_made': 'promise',
                'promise_fulfilled': 'promise',
                'other': 'event'
            };
            return types[type] || 'event';
        }

        // 页面加载时初始化（只加载一次，不重复）
        window.addEventListener('DOMContentLoaded', () => {
            loadAgentState();
            loadPromises();
            loadEvents();
        });
    </script>
</body>
</html>
