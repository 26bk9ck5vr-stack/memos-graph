# memos-graph configuration example
# Copy this file to config.yaml and fill in your actual values

database:
  url: postgresql+asyncpg://user:password@localhost:5432/memos_graph
  pool_size: 10
  pool_recycle: 3600

llm:
  # Example for Xunfei API
  base_url: https://maas-coding-api.cn-huabei-1.xf-yun.com/v2
  api_key: YOUR_API_KEY_HERE
  model: astron-code-latest
  timeout_seconds: 60

embedding:
  # Example for SiliconFlow API
  provider: siliconflow
  model: BAAI/bge-m3
  base_url: https://api.siliconflow.cn/v1
  api_key: YOUR_API_KEY_HERE
  dimension: 1024
  timeout_seconds: 30

# Optional: Hermes integration
hermes:
  state_db_path: ~/.hermes/state.db
  sync_interval_seconds: 60
  agent_id: hermes

# Optional: Viewer UI
viewer:
  enabled: true
  port: 8766
